# ChattyChannels — castellano
# Todos los strings son MiniMessage. El prefijo de chat lo añade el SDK
# automáticamente — no hace falta <prefix> aquí.

channel-switched: "<green>Cambiaste al canal <channel>."
channel-not-found: "<red>Canal desconocido: {channel}"
channel-no-permission: "<red>No tienes permiso para usar ese canal."
channel-list-header: "<gold>Canales disponibles:"
channel-list-entry: "  <gray>- <channel> <dark_gray>(<prefix>)"
channel-cooldown: "<red>Espera <seconds>s antes de enviar otro mensaje."
channel-muted: "<red>Estás silenciado en ese canal."

mute-applied: "<green><target> silenciado en <channel> por <duration>."
mute-permanent: "<green><target> silenciado en <channel> permanentemente."
mute-not-found: "<red>Jugador '<target>' no encontrado."
mute-usage: "<red>Uso: /mute <jugador> [canal] [duración: 10m, 1h, 2d]"

spy-enabled: "<gold>Modo espía <green>activado</green>."
spy-disabled: "<gold>Modo espía <red>desactivado</red>."
spy-prefix: "<dark_gray>[SPY] "

reload-success: "<green>ChattyChannels recargado correctamente."

filter-spam-duplicate: "<red>No envíes el mismo mensaje repetidamente."
filter-spam-caps: "<red>Por favor escribe en minúsculas."
filter-spam-flood: "<red>Estás enviando mensajes muy rápido."
filter-word-block: "<red>Tu mensaje contiene palabras no permitidas."

channel-hidden: "<green>Canal {channel} oculto. No recibirás sus mensajes."
channel-shown: "<green>Canal {channel} visible de nuevo."
channel-not-hidden: "<yellow>Ese canal no estaba oculto."
channel-already-hidden: "<yellow>Ese canal ya estaba oculto."
hidden-list-empty: "<gray>No tienes canales ocultos."
hidden-list: "<gray>Canales ocultos: {channels}"

# Mensajes privados
pm-sent:      "<gray>[<gold>Tú → {to}</gold>]</gray> <white>{message}</white>"
pm-received:  "<gray>[<gold>{from} → Ti</gold>]</gray> <white>{message}</white>"
pm-spy:       "<dark_gray>[SPY] {from} → {to}: {message}</dark_gray>"
pm-offline:   "<red>{player} no está conectado.</red>"
pm-no-permission: "<red>No tienes permiso para enviar mensajes privados.</red>"
pm-ignored-by-them: "<red>No puedes enviar mensajes a {player}.</red>"
pm-ignored-by-you:  "<red>Tienes a {player} ignorado.</red>"
pm-usage:     "<red>Uso: /msg <jugador> <mensaje>"
reply-usage:  "<red>Uso: /reply <mensaje>"
reply-no-target: "<red>Aún no has recibido ningún mensaje."
reply-offline:   "<red>Ese jugador ya no está online."

# Ignorar
ignore-added:        "<yellow>Ahora ignoras a {player}.</yellow>"
ignore-removed:      "<yellow>Ya no ignoras a {player}.</yellow>"
ignore-list-header:  "<gold>Jugadores ignorados ({count}):</gold>"
ignore-list-entry:   "<gray>  - {player}</gray>"
ignore-list-empty:   "<gray>No tienes jugadores ignorados.</gray>"
ignore-usage:        "<red>Uso: /ignore <jugador|list>"

# Amigos
friend-request-sent:     "<green>Solicitud de amistad enviada a {player}.</green>"
friend-request-received: "<yellow>{player} quiere ser tu amigo.</yellow>"
friend-request-exists:   "<yellow>Ya enviaste una solicitud a {player}.</yellow>"
friend-no-request:       "<red>No hay solicitud pendiente de {player}.</red>"
friend-accepted:         "<green>¡Ahora eres amigo de {player}!</green>"
friend-accepted-other:   "<green>¡{player} aceptó tu solicitud de amistad!</green>"
friend-denied:           "<gray>Rechazaste la solicitud de {player}.</gray>"
friend-already:          "<yellow>Ya eres amigo de {player}.</yellow>"
friend-not-friends:      "<red>No eres amigo de {player}.</red>"
friend-removed:          "<gray>{player} eliminado de tu lista de amigos.</gray>"
friend-self:             "<red>No puedes añadirte a ti mismo como amigo.</red>"
friend-max:              "<red>Has alcanzado el máximo de {max} amigos.</red>"
friend-target-max:       "<red>{player} ya tiene el máximo de amigos.</red>"
friend-list-empty:       "<gray>Aún no tienes amigos. Usa /friend add <jugador>.</gray>"
friend-requests-empty:   "<gray>No tienes solicitudes de amistad pendientes.</gray>"
friend-notify-on:        "<green>Notificaciones de amigos activadas.</green>"
friend-notify-off:       "<gray>Notificaciones de amigos desactivadas.</gray>"
friend-connected:        "<green>● {player} se ha conectado.</green>"
friend-disconnected:     "<gray>◌ {player} se ha desconectado.</gray>"
