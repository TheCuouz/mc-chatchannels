# ChattyChannels — english fallback
# All strings are MiniMessage. The chat prefix is prepended by the SDK
# automatically — no <prefix> needed here.

channel-switched: "<green>You switched to channel <channel>."
channel-not-found: "<red>Unknown channel: {channel}"
channel-no-permission: "<red>You don't have permission to use that channel."
channel-list-header: "<gold>Available channels:"
channel-list-entry: "  <gray>- <channel> <dark_gray>(<prefix>)"
channel-cooldown: "<red>Wait <seconds>s before sending another message."
channel-muted: "<red>You are muted in that channel."

mute-applied: "<green><target> muted in <channel> for <duration>."
mute-permanent: "<green><target> permanently muted in <channel>."
mute-not-found: "<red>Player '<target>' not found."
mute-usage: "<red>Usage: /mute <player> [channel] [duration: 10m, 1h, 2d]"

spy-enabled: "<gold>Spy mode <green>enabled</green>."
spy-disabled: "<gold>Spy mode <red>disabled</red>."
spy-prefix: "<dark_gray>[SPY] "

reload-success: "<green>ChattyChannels reloaded successfully."

filter-spam-duplicate: "<red>Don't send the same message repeatedly."
filter-spam-caps: "<red>Please write in lowercase."
filter-spam-flood: "<red>You are sending messages too fast."
filter-word-block: "<red>Your message contains forbidden words."

channel-hidden: "<green>Channel {channel} hidden. You won't receive its messages."
channel-shown: "<green>Channel {channel} visible again."
channel-not-hidden: "<yellow>That channel was not hidden."
channel-already-hidden: "<yellow>That channel was already hidden."
hidden-list-empty: "<gray>You have no hidden channels."
hidden-list: "<gray>Hidden channels: {channels}"

# Private Messages
pm-sent:      "<gray>[<gold>You → {to}</gold>]</gray> <white>{message}</white>"
pm-received:  "<gray>[<gold>{from} → You</gold>]</gray> <white>{message}</white>"
pm-spy:       "<dark_gray>[SPY] {from} → {to}: {message}</dark_gray>"
pm-offline:   "<red>{player} is not connected.</red>"
pm-no-permission: "<red>You don't have permission to send private messages.</red>"
pm-ignored-by-them: "<red>You cannot send messages to {player}.</red>"
pm-ignored-by-you:  "<red>You have {player} ignored.</red>"
pm-usage:     "<red>Usage: /msg <player> <message>"
reply-usage:  "<red>Usage: /reply <message>"
reply-no-target: "<red>You haven't received any messages yet."
reply-offline:   "<red>That player is no longer online."

# Ignore
ignore-added:        "<yellow>You are now ignoring {player}.</yellow>"
ignore-removed:      "<yellow>You are no longer ignoring {player}.</yellow>"
ignore-list-header:  "<gold>Ignored players ({count}):</gold>"
ignore-list-entry:   "<gray>  - {player}</gray>"
ignore-list-empty:   "<gray>You have no ignored players.</gray>"
ignore-usage:        "<red>Usage: /ignore <player|list>"

# Friends
friend-request-sent:     "<green>Friend request sent to {player}.</green>"
friend-request-received: "<yellow>{player} wants to be your friend.</yellow>"
friend-request-exists:   "<yellow>You already sent a request to {player}.</yellow>"
friend-no-request:       "<red>No pending request from {player}.</red>"
friend-accepted:         "<green>You are now friends with {player}!</green>"
friend-accepted-other:   "<green>{player} accepted your friend request!</green>"
friend-denied:           "<gray>You denied {player}'s friend request.</gray>"
friend-already:          "<yellow>You are already friends with {player}.</yellow>"
friend-not-friends:      "<red>You are not friends with {player}.</red>"
friend-removed:          "<gray>{player} removed from your friends list.</gray>"
friend-self:             "<red>You cannot add yourself as a friend.</red>"
friend-max:              "<red>You have reached the maximum of {max} friends.</red>"
friend-target-max:       "<red>{player} already has the maximum number of friends.</red>"
friend-list-empty:       "<gray>You have no friends yet. Use /friend add <player>.</gray>"
friend-requests-empty:   "<gray>No pending friend requests.</gray>"
friend-notify-on:        "<green>Friend notifications enabled.</green>"
friend-notify-off:       "<gray>Friend notifications disabled.</gray>"
friend-connected:        "<green>● {player} connected.</green>"
friend-disconnected:     "<gray>◌ {player} disconnected.</gray>"
